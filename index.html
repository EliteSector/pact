<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pact</title>
<meta name="description" content="Make promises. Earn points. Settle favors.">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- iOS PWA install support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pact">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f8f5f0">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-512.png">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/screens.css">
</head>
<body>
<div id="app"><div class="center-screen"><div class="spinner"></div></div></div>
<script>
  // If js/main.js (or its supabase-js import) never runs — e.g. a stalled network
  // fetch right after opening the installed app — don't leave the spinner stuck forever.
  window.__pactBootTimer = setTimeout(function () {
    document.getElementById('app').innerHTML =
      '<div class="center-screen">' +
        '<div class="icon-tile" style="background:var(--red)"><img src="assets/pk/icons/shield-check.png" alt="" style="width:44px;height:44px"></div>' +
        '<div style="font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--ink)">Couldn\'t connect</div>' +
        '<div style="font-family:var(--font-body);font-size:14px;color:var(--text-muted);max-width:260px">Check your connection and try again. Your contracts are safe — nothing was lost.</div>' +
        '<button class="btn btn-primary btn-lg btn-block" onclick="location.reload()">Try Again</button>' +
      '</div>';
  }, 12000);
</script>
<script src="js/vendor/supabase-js.umd.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
